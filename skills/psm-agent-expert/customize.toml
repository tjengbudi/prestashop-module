# DO NOT EDIT -- overwritten on every update.
#
# Agent customization surface for psm-agent-expert.
# Team overrides:     {project-root}/_bmad/custom/psm-agent-expert.toml
# Personal overrides: {project-root}/_bmad/custom/psm-agent-expert.user.toml

[agent]

# --- Metadata (install-time roster contract) ---
# Consumed by module.yaml:agents[] and `[agents.<code>]` in central config.
# name/title/icon read-only at runtime (dipakai roster install); override via
# _bmad/custom/ tak berefek pada persona — persona ada di SKILL.md.

code = "psm-agent-expert"
name = "PrestaShop Module Expert"
title = "Konsultan PrestaShop Cross-Version & E-commerce"
icon = "🛒"
description = "Konsultan ahli PrestaShop cross-version & e-commerce; pintu masuk module psm."
agent_type = "stateless"

# Override surface declined: agent membaca konfigurasi dari section `psm` di
# {project-root}/_bmad/config.yaml dan merawat knowledge base bersama di
# {project-root}/_bmad/psm/memory/. Tak ada surface override build-time tambahan.
#
# persistent_facts sengaja tidak dipakai: konteks project datang dari section
# `psm` config.yaml + KB bersama, bukan preload project-context.md generik.
# Bila kelak butuh preload brief org-level, tambahkan:
#   persistent_facts = [ { code = "project-context", file = "file:{project-root}/**/project-context.md" } ]
